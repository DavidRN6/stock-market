<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Stock UI Intro</title>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="intro.css" />
  </head>

  <body>
    <section class="intro">
      <!-- Background Glows -->
      <div class="glow glow-top"></div>
      <div class="glow glow-bottom"></div>

      <!-- Text -->
      <div class="text-container">
        <div class="fade-left delay-1">
          <h1 class="title">
            Smart Decisions <br />
            <span>Better Investments</span>
          </h1>
        </div>

        <p class="description fade-left delay-2">
          AI-powered system to analyze stock market data and support your
          decision-making process with real-time insights.
        </p>

        <div class="fade-up delay-3">
          <a href="home.html">
            <button class="cta-btn">
              <span>Explore website</span>
            </button>
          </a>
        </div>
      </div>

      <!-- Visual -->
      <div class="visual">
        <div class="card">
          <!-- dots -->
          <div class="dots"><span></span><span></span><span></span></div>

          <!-- chart line -->
          <div class="chart-line"></div>

          <!-- bars -->
          <div class="bars">
            <div style="height: 40%"></div>
            <div style="height: 70%"></div>
            <div style="height: 90%"></div>
            <div style="height: 60%"></div>
            <div style="height: 80%"></div>
            <div style="height: 50%"></div>
            <div style="height: 100%"></div>
          </div>

          <!-- floating card -->
          <div class="float-card top">Growth +24%</div>

          <div class="float-card bottom">Allocation</div>

          <div class="ai-card">
            <small>AI Recommend</small>
            <h2>BUY</h2>
            <div class="progress">
              <div></div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
